name: Raccolta settimanale dichiarazioni

on:
  schedule:
    # Ogni lunedi' alle 06:00 UTC (07:00/08:00 ora italiana secondo l'ora legale).
    # Per cambiare frequenza, modifica questa riga (sintassi cron standard).
    - cron: "0 6 * * 1"
  workflow_dispatch: {}  # permette anche l'avvio manuale da GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Imposta Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui pipeline settimanale
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/run_weekly.py

      - name: Commit risultati aggiornati
        run: |
          git config user.name "politici-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/tracker.db frontend/data/
          git diff --staged --quiet || git commit -m "Aggiornamento automatico settimanale"
          git push
